<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produkt — Swedsnus</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="age-banner">Tobaksförsäljning — åldersgräns 18 år · Legitimation kan krävas</div>
  <main class="page-wrap" style="min-height:60vh;display:grid;place-items:center;text-align:center;">
    <section>
      <p class="hero-tagline">Produktdata laddas</p>
      <h1>Öppnar produktsida</h1>
      <p>Den gamla produktmallen skickar vidare till rätt datadriven produktsida.</p>
      <div class="btn-row" style="justify-content:center;"><a class="btn btn-primary" href="portion.html">Till sortimentet</a></div>
    </section>
  </main>
  <script src="product-data.js"></script>
  <script>
    (() => {
      function redirect() {
        const api = window.SwedsnusProducts;
        if (!api?.rows?.length || !api.urlFor) return false;
        const query = new URLSearchParams(window.location.search);
        const id = query.get('id');
        const product = query.get('product');
        const variant = query.get('variant');
        let row = null;
        if (id && api.rowKey) row = api.rows.find(item => api.rowKey(item) === id);
        if (!row && product && variant) row = api.rows.find(item => item.product_id === product && String(item.variant_id || '') === variant);
        if (!row && product) row = api.rows.find(item => item.product_id === product);
        if (!row) row = api.rows.find(item => item.product_family === 'Portionssnus') || api.rows[0];
        if (!row) return false;
        window.location.replace(api.urlFor(row));
        return true;
      }
      if (!redirect()) document.addEventListener('swedsnus:products-rendered', redirect, { once: true });
      setTimeout(redirect, 300);
      setTimeout(redirect, 1000);
    })();
  </script>
</body>
</html>
