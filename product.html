<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produkt — Swedsnus</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="catalog">
  <div class="page-title-bar"><div class="page-title-bar-inner"><p class="breadcrumb"><a href="index.html">Hem</a> / <a href="portion.html" data-product-category-link>Sortiment</a> / <span data-product-breadcrumb>Produkt</span></p></div></div>

  <main class="product-page">
    <div class="product-layout">
      <div class="product-gallery"><div class="img-placeholder main-img">Produktbild</div><div class="thumb-row"><div class="thumb active"></div><div class="thumb"></div><div class="thumb"></div></div></div>
      <div class="product-detail">
        <div class="product-detail-badge"><span class="product-card-badge">Produkt</span></div>
        <h1 data-product-title>Produkt</h1>
        <p class="product-detail-price" id="main-price">0 kr <small>1-pack</small></p>
        <dl class="product-detail-meta"></dl>
        <section class="product-choice-panel" aria-label="Produktval"></section>
        <p class="pack-picker-label">Välj köpantal</p>
        <div class="pack-picker-options"></div>
        <div class="add-to-cart-main"><div class="qty-btn-group"><button class="qty-btn qty-minus" aria-label="Minska antal">−</button><input class="qty-display" type="number" value="1" min="1" readonly aria-label="Antal" /><button class="qty-btn qty-plus" aria-label="Öka antal">+</button></div><a href="cart.html" class="btn btn-primary" style="flex:1;justify-content:center;">Lägg i kundvagn</a></div>
        <p class="product-desc"></p>
        <table class="product-spec-table"><thead><tr><th colspan="2">Produktspecifikation</th></tr></thead><tbody></tbody></table>
        <div class="btn-row"><a href="guide.html" class="btn btn-outline btn-sm">Beredningsguide</a></div>
      </div>
    </div>
  </main>

  <script src="product-data.js"></script>
  <script src="main.js"></script>
</body>
</html>
