<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kundvagn — Swedsnus</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="cart">
  <div class="page-title-bar">
    <div class="page-title-bar-inner">
      <h1>Kundvagn</h1>
      <p class="breadcrumb"><a href="index.html">Hem</a> / Kundvagn</p>
    </div>
  </div>

  <main class="page-wrap" data-cart-page>
    <div class="cart-page-layout">
      <section>
        <h2 class="section-heading">Dina produkter</h2>
        <div class="cart-page-list" data-cart-items></div>
      </section>

      <aside class="cart-summary" aria-label="Orderöversikt">
        <h2>Orderöversikt</h2>
        <div class="cart-summary-row"><span>Antal</span><strong data-cart-summary-count>0 artiklar</strong></div>
        <div class="cart-summary-row"><span>Frakt</span><strong>Beräknas i kassan</strong></div>
        <div class="cart-summary-row"><span>Totalt</span><strong data-cart-summary-total>0 kr</strong></div>
        <a href="#" class="btn btn-primary">Fortsätt till kassan</a>
      </aside>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
